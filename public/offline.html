<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · Federated Relief</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f8fc;
      color: #15212e;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
    }
    .mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0aa5c2, #0672a0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 34px;
      font-weight: 700;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #56687a; line-height: 1.5; margin: 0 0 24px; }
    button {
      appearance: none;
      border: none;
      background: #0891b2;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">◆</div>
    <h1>You're offline</h1>
    <p>
      Federated Relief needs a connection to load live incidents and needs.
      Check your network — the app will pick up right where you left off once
      you're back online.
    </p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
